<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmarterNerd — SEO Services Documentation</title>
<style>
  :root {
    --ink: #0a1233;
    --brand: #3b49f0;
    --cyan: #1fd3ff;
    --magenta: #ff3aa0;
    --bg: #f5f6fb;
    --surface: #ffffff;
    --line: #e7e9f3;
    --text: #1d2236;
    --muted: #5b647e;
    --accent: #0891b2;
    --r: 16px;
    --r-lg: 22px;
    --sh-1: 0 1px 2px rgba(16, 24, 64, 0.06), 0 2px 8px rgba(16, 24, 64, 0.05);
    --sh-2: 0 8px 24px rgba(16, 24, 64, 0.1);
    --sh-3: 0 18px 48px rgba(48, 40, 140, 0.22);
  }

  * {
    box-sizing: border-box;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    margin: 0;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 20px;
  }

  /* Header */
  header {
    background: linear-gradient(135deg, var(--ink) 0%, #1b2a86 100%);
    color: #fff;
    padding: 40px 20px;
    text-align: center;
    box-shadow: var(--sh-3);
  }

  header h1 {
    margin: 0 0 8px;
    font-size: 32px;
    font-weight: 800;
  }

  header p {
    margin: 0;
    font-size: 16px;
    opacity: 0.9;
  }

  /* Nav Tabs */
  .tabs {
    display: flex;
    gap: 8px;
    border-bottom: 2px solid var(--line);
    padding: 0 20px;
    margin: 0;
    list-style: none;
    overflow-x: auto;
    background: var(--surface);
    box-shadow: var(--sh-1);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .tab {
    padding: 0;
  }

  .tab button {
    background: none;
    border: none;
    padding: 16px 20px;
    font-size: 15px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s ease;
  }

  .tab button:hover {
    color: var(--brand);
  }

  .tab button.active {
    color: var(--brand);
    border-bottom-color: var(--brand);
  }

  /* Main Content */
  main {
    display: flex;
    gap: 0;
  }

  .sidebar {
    width: 280px;
    background: var(--surface);
    border-right: 1px solid var(--line);
    padding: 24px 16px;
    box-shadow: var(--sh-1);
    position: sticky;
    top: 65px;
    max-height: calc(100vh - 65px);
    overflow-y: auto;
  }

  .sidebar h3 {
    margin: 0 0 12px;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .sidebar ul {
    list-style: none;
    margin: 0 0 24px;
    padding: 0;
  }

  .sidebar li {
    margin-bottom: 6px;
  }

  .sidebar a {
    display: block;
    padding: 8px 12px;
    border-radius: 8px;
    color: var(--text);
    text-decoration: none;
    font-size: 13px;
    transition: all 0.15s ease;
  }

  .sidebar a:hover {
    background: var(--bg);
    color: var(--brand);
  }

  .sidebar a.active {
    background: linear-gradient(135deg, #eceaff, #e0f7fb);
    color: var(--brand);
    font-weight: 600;
  }

  .content {
    flex: 1;
    padding: 32px;
    overflow-y: auto;
    max-height: calc(100vh - 65px);
  }

  .tab-content {
    display: none;
  }

  .tab-content.active {
    display: block;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(8px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* Markdown rendering */
  .markdown {
    line-height: 1.7;
  }

  .markdown h1,
  .markdown h2,
  .markdown h3 {
    margin-top: 24px;
    margin-bottom: 12px;
    font-weight: 800;
    color: var(--ink);
  }

  .markdown h1 {
    font-size: 28px;
    border-bottom: 2px solid var(--line);
    padding-bottom: 12px;
  }

  .markdown h2 {
    font-size: 22px;
  }

  .markdown h3 {
    font-size: 16px;
  }

  .markdown p {
    margin: 12px 0;
  }

  .markdown ul,
  .markdown ol {
    margin: 12px 0;
    padding-left: 24px;
  }

  .markdown li {
    margin-bottom: 6px;
  }

  .markdown table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0;
    font-size: 14px;
  }

  .markdown table th {
    background: var(--bg);
    padding: 12px;
    text-align: left;
    font-weight: 700;
    border: 1px solid var(--line);
    color: var(--ink);
  }

  .markdown table td {
    padding: 10px 12px;
    border: 1px solid var(--line);
  }

  .markdown table tr:nth-child(even) {
    background: rgba(245, 246, 251, 0.5);
  }

  .markdown strong {
    font-weight: 700;
    color: var(--ink);
  }

  .markdown code {
    background: var(--bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: monospace;
    font-size: 13px;
  }

  .markdown blockquote {
    border-left: 4px solid var(--brand);
    padding-left: 16px;
    margin: 16px 0;
    color: var(--muted);
    font-style: italic;
  }

  /* HTML Summary Frame */
  .summary-frame {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    box-shadow: var(--sh-2);
    min-height: 600px;
  }

  /* Footer */
  footer {
    text-align: center;
    padding: 24px 20px;
    border-top: 1px solid var(--line);
    background: var(--surface);
    color: var(--muted);
    font-size: 12px;
    margin-top: 32px;
  }

  footer a {
    color: var(--brand);
    text-decoration: none;
  }

  footer a:hover {
    text-decoration: underline;
  }

  /* Responsive */
  @media (max-width: 900px) {
    main {
      flex-direction: column;
    }

    .sidebar {
      width: 100%;
      border-right: none;
      border-bottom: 1px solid var(--line);
      position: static;
      max-height: none;
      display: flex;
      gap: 24px;
      overflow-x: auto;
      padding: 16px 20px;
    }

    .sidebar h3 {
      display: none;
    }

    .sidebar ul {
      display: flex;
      gap: 8px;
      margin: 0;
      flex-direction: row;
    }

    .sidebar li {
      margin-bottom: 0;
    }

    .content {
      padding: 24px;
      max-height: none;
    }

    header h1 {
      font-size: 24px;
    }
  }

  @media (max-width: 600px) {
    .tabs {
      padding: 0;
    }

    .tab button {
      padding: 12px 16px;
      font-size: 14px;
    }

    header {
      padding: 24px 16px;
    }

    header h1 {
      font-size: 20px;
    }

    .content {
      padding: 16px;
    }

    .sidebar {
      gap: 16px;
    }

    .sidebar ul {
      gap: 4px;
    }

    .sidebar a {
      padding: 6px 10px;
      font-size: 12px;
    }
  }

  /* Print */
  @media print {
    header,
    .tabs,
    .sidebar,
    footer {
      display: none;
    }

    main {
      flex-direction: column;
    }

    .content {
      padding: 0;
      max-height: none;
    }
  }
</style>
</head>
<body>

<header>
  <div class="container">
    <h1>SmarterNerd — SEO Services</h1>
    <p>Complete documentation for prospects and partners</p>
  </div>
</header>

<ul class="tabs">
  <li class="tab">
    <button class="tab-btn active" data-tab="summary">📊 Services Summary</button>
  </li>
  <li class="tab">
    <button class="tab-btn" data-tab="contract">📋 Contract Template</button>
  </li>
</ul>

<main>
  <!-- Sidebar Navigation for Contract Sections -->
  <aside class="sidebar" id="contract-sidebar">
    <h3>Contract Sections</h3>
    <ul id="toc"></ul>
  </aside>

  <!-- Main Content -->
  <div class="content">
    <!-- Services Summary Tab -->
    <div class="tab-content active" id="summary">
      <iframe
        class="summary-frame"
        src="SmarterNerd SEO Services Summary.html"
        title="SmarterNerd SEO Services Summary"
        frameborder="0"
        scrolling="yes"
        style="height: 100vh; width: 100%;"
      ></iframe>
    </div>

    <!-- Contract Template Tab -->
    <div class="tab-content" id="contract">
      <div class="markdown" id="markdown-content"></div>
    </div>
  </div>
</main>

<footer>
  <p>
    📧 <a href="mailto:jesse@SmarterNerd.com">jesse@SmarterNerd.com</a>
    &nbsp;·&nbsp;
    📞 <a href="tel:+16122905116">(612) 290-5116</a>
    &nbsp;·&nbsp;
    🌐 <a href="https://SmarterNerd.com" target="_blank">SmarterNerd.com</a>
  </p>
  <p>
    <a href="SmarterNerd SEO Services Summary.html" download>Download Summary (HTML)</a>
    &nbsp;·&nbsp;
    <a href="SmarterNerd SEO Contract Template.md" download>Download Contract (Markdown)</a>
  </p>
  <p>© 2026 SmarterNerd · All rights reserved</p>
</footer>

<script>
  // Markdown to HTML converter (basic)
  function markdownToHtml(markdown) {
    let html = markdown;

    // Headers
    html = html.replace(/^### (.*?)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.*?)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.*?)$/gm, '<h1>$1</h1>');

    // Bold
    html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

    // Italic
    html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');

    // Inline code
    html = html.replace(/`(.*?)`/g, '<code>$1</code>');

    // Line breaks
    html = html.replace(/\n\n/g, '</p><p>');
    html = '<p>' + html + '</p>';

    // Lists
    html = html.replace(/^\s*- (.*?)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>.*?<\/li>)/s, (match) => {
      return '<ul>' + match + '</ul>';
    });

    // Clean up multiple lists
    html = html.replace(/<\/ul>\s*<ul>/g, '');

    return html;
  }

  // Fetch and render markdown
  async function loadMarkdown() {
    try {
      const response = await fetch('SmarterNerd SEO Contract Template.md');
      const markdown = await response.text();
      const htmlContent = document.getElementById('markdown-content');
      htmlContent.innerHTML = markdownToHtml(markdown);

      // Generate table of contents
      generateTOC(markdown);
    } catch (error) {
      console.error('Error loading markdown:', error);
      document.getElementById('markdown-content').innerHTML =
        '<p style="color: var(--muted);">Error loading contract. <a href="SmarterNerd SEO Contract Template.md">View raw file</a></p>';
    }
  }

  // Generate table of contents
  function generateTOC(markdown) {
    const lines = markdown.split('\n');
    const toc = document.getElementById('toc');
    let count = 0;

    lines.forEach((line, index) => {
      if (line.startsWith('# ') && !line.startsWith('##')) {
        count++;
        const text = line.replace(/^# /, '').trim();
        const id = `section-${count}`;
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = '#';
        a.textContent = text;
        a.addEventListener('click', (e) => {
          e.preventDefault();
          const h1 = Array.from(document.querySelectorAll('h1')).find(
            (h) => h.textContent.includes(text)
          );
          if (h1) {
            h1.scrollIntoView({ behavior: 'smooth' });
            a.classList.add('active');
            Array.from(toc.querySelectorAll('a')).forEach((link) => {
              if (link !== a) link.classList.remove('active');
            });
          }
        });
        li.appendChild(a);
        toc.appendChild(li);
      }
    });
  }

  // Tab switching
  document.querySelectorAll('.tab-btn').forEach((btn) => {
    btn.addEventListener('click', () => {
      const tabName = btn.dataset.tab;

      // Remove active class from all buttons and contents
      document.querySelectorAll('.tab-btn').forEach((b) => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach((c) => c.classList.remove('active'));

      // Add active class to clicked button and corresponding content
      btn.classList.add('active');
      document.getElementById(tabName).classList.add('active');

      // Show/hide sidebar
      const sidebar = document.getElementById('contract-sidebar');
      if (tabName === 'contract') {
        sidebar.style.display = 'flex';
      } else {
        sidebar.style.display = 'none';
      }

      // Load markdown on contract tab
      if (tabName === 'contract' && !document.getElementById('markdown-content').innerHTML) {
        loadMarkdown();
      }
    });
  });

  // Load markdown on page load (optional, remove if slow)
  // loadMarkdown();
</script>

</body>
</html>
