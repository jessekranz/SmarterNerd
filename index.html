<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmarterNerd — SEO Services Documentation</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    /* Dark Stargate Palette */
    --ink: #0f0f1f;
    --brand: #00d4ff;
    --accent-gold: #ffd700;
    --accent-violet: #9d4edd;
    --accent-orange: #ff6b35;
    --bg: #0a0e27;
    --surface: #1a1f3a;
    --surface-light: #252d52;
    --line: #2d3561;
    --text: #f0f4f8;
    --muted: #a8b2cf;
    --r: 12px;
    --r-lg: 20px;
    --sh-1: 0 4px 12px rgba(0, 212, 255, 0.08), 0 2px 6px rgba(0, 0, 0, 0.3);
    --sh-2: 0 12px 32px rgba(0, 212, 255, 0.15), 0 4px 12px rgba(0, 0, 0, 0.4);
    --sh-3: 0 24px 64px rgba(0, 212, 255, 0.25), 0 8px 24px rgba(157, 78, 221, 0.15);
  }

  * {
    box-sizing: border-box;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    margin: 0;
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(circle at 20% 50%, rgba(0, 212, 255, 0.08) 0%, transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(157, 78, 221, 0.08) 0%, transparent 40%);
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 20px;
  }

  /* Header */
  header {
    background: linear-gradient(135deg, var(--ink) 0%, #1a1f3a 50%, var(--surface) 100%);
    border-bottom: 2px solid;
    border-image: linear-gradient(90deg, var(--brand), var(--accent-violet), var(--accent-gold)) 1;
    color: var(--text);
    padding: 48px 20px;
    text-align: center;
    box-shadow: var(--sh-3), inset 0 1px 0 rgba(0, 212, 255, 0.1);
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: radial-gradient(circle at 50% 0%, rgba(0, 212, 255, 0.1), transparent 60%);
    pointer-events: none;
  }

  header > * {
    position: relative;
    z-index: 1;
  }

  header h1 {
    margin: 0 0 8px;
    font-size: 42px;
    font-weight: 800;
    font-family: 'Poppins', sans-serif;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--brand), var(--accent-gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p {
    margin: 0;
    font-size: 15px;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* Nav Tabs */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--line);
    padding: 0;
    margin: 0;
    list-style: none;
    overflow-x: auto;
    background: var(--surface);
    box-shadow: var(--sh-1);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
    background: rgba(26, 31, 58, 0.8);
  }

  .tab {
    padding: 0;
    flex: 1;
  }

  .tab button {
    background: none;
    border: none;
    padding: 16px 24px;
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.3s ease;
    width: 100%;
    text-align: center;
    position: relative;
  }

  .tab button::before {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--brand), var(--accent-gold));
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .tab button:hover {
    color: var(--brand);
    background: rgba(0, 212, 255, 0.08);
  }

  .tab button.active {
    color: var(--brand);
  }

  .tab button.active::before {
    opacity: 1;
  }

  /* Main Content */
  main {
    display: flex;
    gap: 0;
  }

  .sidebar {
    width: 280px;
    background: var(--surface-light);
    border-right: 1px solid var(--line);
    padding: 28px 20px;
    box-shadow: var(--sh-1);
    position: sticky;
    top: 65px;
    max-height: calc(100vh - 65px);
    overflow-y: auto;
    display: none;
    backdrop-filter: blur(10px);
  }

  .sidebar.visible {
    display: block;
  }

  .sidebar h3 {
    margin: 0 0 20px;
    padding: 12px 0 0 0;
    font-size: 11px;
    font-weight: 700;
    color: var(--brand);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    display: block;
    border-top: 1px solid var(--line);
  }

  .sidebar ul {
    list-style: none;
    margin: 0;
    padding: 0;
  }

  .sidebar li {
    margin-bottom: 8px;
  }

  .sidebar a {
    display: block;
    padding: 10px 14px;
    border-radius: var(--r);
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.25s ease;
    border-left: 3px solid transparent;
    position: relative;
  }

  .sidebar a:hover {
    background: rgba(0, 212, 255, 0.08);
    color: var(--brand);
    border-left-color: var(--brand);
    padding-left: 18px;
  }

  .sidebar a.active {
    background: rgba(0, 212, 255, 0.12);
    color: var(--brand);
    font-weight: 600;
    border-left-color: var(--brand);
  }

  .content {
    flex: 1;
    padding: 40px;
    overflow-y: auto;
    max-height: calc(100vh - 65px);
    background: linear-gradient(135deg, rgba(15, 15, 31, 0.4), rgba(26, 31, 58, 0.4));
  }

  .tab-content {
    display: none;
  }

  .tab-content.active {
    display: block;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(8px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* Markdown rendering */
  .markdown {
    line-height: 1.8;
    max-width: 900px;
  }

  .markdown h1,
  .markdown h2,
  .markdown h3 {
    margin-top: 32px;
    margin-bottom: 16px;
    font-weight: 800;
    font-family: 'Poppins', sans-serif;
    letter-spacing: -0.01em;
  }

  .markdown h1 {
    font-size: 32px;
    border-bottom: 2px solid;
    border-image: linear-gradient(90deg, var(--brand), transparent) 1;
    padding-bottom: 16px;
    color: var(--brand);
  }

  .markdown h2 {
    font-size: 24px;
    color: var(--text);
  }

  .markdown h2::before {
    content: '→ ';
    color: var(--accent-gold);
  }

  .markdown h3 {
    font-size: 16px;
    color: var(--accent-violet);
  }

  .markdown p {
    margin: 14px 0;
    color: var(--text);
  }

  .markdown ul,
  .markdown ol {
    margin: 16px 0;
    padding-left: 28px;
  }

  .markdown li {
    margin-bottom: 8px;
    color: var(--muted);
  }

  .markdown li strong {
    color: var(--text);
  }

  .markdown table {
    width: 100%;
    border-collapse: collapse;
    margin: 24px 0;
    font-size: 13px;
    border-radius: var(--r);
    overflow: hidden;
    box-shadow: var(--sh-1);
  }

  .markdown table th {
    background: linear-gradient(90deg, var(--surface-light), var(--surface));
    padding: 14px 16px;
    text-align: left;
    font-weight: 700;
    border: 1px solid var(--line);
    color: var(--brand);
  }

  .markdown table td {
    padding: 12px 16px;
    border: 1px solid var(--line);
    color: var(--text);
  }

  .markdown table tr:nth-child(even) {
    background: rgba(26, 31, 58, 0.4);
  }

  .markdown strong {
    font-weight: 700;
    color: var(--accent-gold);
  }

  .markdown code {
    background: rgba(0, 212, 255, 0.08);
    padding: 4px 8px;
    border-radius: 4px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--brand);
  }

  .markdown blockquote {
    border-left: 4px solid var(--accent-violet);
    padding-left: 20px;
    margin: 20px 0;
    color: var(--muted);
    font-style: italic;
    background: rgba(157, 78, 221, 0.05);
    padding: 16px 16px 16px 20px;
    border-radius: var(--r);
  }

  /* HTML Summary Frame */
  .summary-frame {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    box-shadow: var(--sh-2);
    min-height: 600px;
    background: var(--surface);
  }

  /* Footer */
  footer {
    text-align: center;
    padding: 32px 20px;
    border-top: 1px solid var(--line);
    background: var(--surface-light);
    color: var(--muted);
    font-size: 12px;
    margin-top: 40px;
  }

  footer p {
    margin: 8px 0;
  }

  footer a {
    color: var(--brand);
    text-decoration: none;
    font-weight: 500;
    transition: all 0.2s ease;
  }

  footer a:hover {
    color: var(--accent-gold);
    text-decoration: underline;
  }

  /* Responsive */
  @media (max-width: 900px) {
    main {
      flex-direction: column;
    }

    .sidebar {
      width: 100%;
      border-right: none;
      border-bottom: 1px solid var(--line);
      position: static;
      max-height: none;
      display: none;
      padding: 16px 20px;
    }

    .sidebar.visible {
      display: block;
    }

    .sidebar h3 {
      display: block;
      margin-bottom: 12px;
    }

    .sidebar ul {
      display: flex;
      gap: 8px;
      margin: 0;
      flex-direction: row;
      overflow-x: auto;
    }

    .sidebar li {
      margin-bottom: 0;
    }

    .content {
      padding: 24px;
      max-height: none;
    }

    header h1 {
      font-size: 24px;
    }
  }

  @media (max-width: 600px) {
    .tabs {
      padding: 0;
    }

    .tab button {
      padding: 12px 16px;
      font-size: 14px;
    }

    header {
      padding: 24px 16px;
    }

    header h1 {
      font-size: 20px;
    }

    .content {
      padding: 16px;
    }

    .sidebar {
      gap: 16px;
    }

    .sidebar ul {
      gap: 4px;
    }

    .sidebar a {
      padding: 6px 10px;
      font-size: 12px;
    }
  }

  /* Print */
  @media print {
    header,
    .tabs,
    .sidebar,
    footer {
      display: none;
    }

    main {
      flex-direction: column;
    }

    .content {
      padding: 0;
      max-height: none;
    }
  }
</style>
</head>
<body>

<header>
  <div class="container">
    <h1>SmarterNerd — SEO Services</h1>
    <p>Complete documentation for prospects and partners</p>
  </div>
</header>

<ul class="tabs">
  <li class="tab">
    <button class="tab-btn active" data-tab="summary">📊 Services Summary</button>
  </li>
  <li class="tab">
    <button class="tab-btn" data-tab="contract">📋 Contract Template</button>
  </li>
</ul>

<main>
  <!-- Sidebar Navigation for Contract Sections -->
  <aside class="sidebar" id="contract-sidebar">
    <h3>Contract Sections</h3>
    <ul id="toc"></ul>
  </aside>

  <!-- Main Content -->
  <div class="content">
    <!-- Services Summary Tab -->
    <div class="tab-content active" id="summary">
      <iframe
        class="summary-frame"
        src="SmarterNerd SEO Services Summary.html"
        title="SmarterNerd SEO Services Summary"
        frameborder="0"
        scrolling="yes"
        style="height: 100vh; width: 100%;"
      ></iframe>
    </div>

    <!-- Contract Template Tab -->
    <div class="tab-content" id="contract">
      <div class="markdown" id="markdown-content"></div>
    </div>
  </div>
</main>

<footer>
  <p>
    📧 <a href="mailto:jesse@SmarterNerd.com">jesse@SmarterNerd.com</a>
    &nbsp;·&nbsp;
    📞 <a href="tel:+16122905116">(612) 290-5116</a>
    &nbsp;·&nbsp;
    🌐 <a href="https://SmarterNerd.com" target="_blank">SmarterNerd.com</a>
  </p>
  <p>
    <a href="SmarterNerd SEO Services Summary.html" download>Download Summary (HTML)</a>
    &nbsp;·&nbsp;
    <a href="SmarterNerd SEO Contract Template.md" download>Download Contract (Markdown)</a>
  </p>
  <p>© 2026 SmarterNerd · All rights reserved</p>
</footer>

<script>
  // Markdown to HTML converter
  function markdownToHtml(markdown) {
    let html = markdown;

    // Escape HTML
    html = html.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    // Headers (before other replacements)
    html = html.replace(/^### (.*?)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.*?)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.*?)$/gm, '<h1>$1</h1>');

    // Tables (simple)
    html = html.replace(/^\|(.+)\|$/gm, (match) => {
      const cells = match.split('|').slice(1, -1).map(c => c.trim());
      const isHeader = cells.some(c => c.includes('---'));
      if (isHeader) return '';
      const tag = cells[0] && cells[0].match(/\*\*/) ? 'th' : 'td';
      const row = cells.map(c => {
        c = c.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        return `<${tag}>${c}</${tag}>`;
      }).join('');
      return `<tr>${row}</tr>`;
    });
    html = html.replace(/(<tr>.*?<\/tr>)/s, (match) => `<table>${match}</table>`);
    html = html.replace(/<\/table>\s*<table>/g, '');

    // Task lists
    html = html.replace(/^- \[ \] (.*?)$/gm, '<li style="list-style: none;"><input type="checkbox" disabled> $1</li>');
    html = html.replace(/^- \[x\] (.*?)$/gm, '<li style="list-style: none;"><input type="checkbox" checked disabled> $1</li>');

    // Lists
    html = html.replace(/^\d+\. (.*?)$/gm, '<li>$1</li>');
    html = html.replace(/^- (.*?)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>.*?<\/li>)/s, (match) => {
      return '<ul>' + match + '</ul>';
    });
    html = html.replace(/<\/ul>\s*<ul>/g, '');

    // Code blocks
    html = html.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');

    // Bold and italic
    html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');

    // Inline code
    html = html.replace(/`(.*?)`/g, '<code>$1</code>');

    // Links
    html = html.replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank">$1</a>');

    // Line breaks - convert double newlines to paragraphs
    const lines = html.split('\n');
    let result = '';
    let inPara = false;

    lines.forEach((line, i) => {
      const trimmed = line.trim();
      if (!trimmed || trimmed.startsWith('<')) {
        if (inPara) result += '</p>';
        inPara = false;
        result += line + '\n';
      } else {
        if (!inPara) result += '<p>';
        inPara = true;
        result += line + ' ';
      }
    });
    if (inPara) result += '</p>';
    html = result;

    return html;
  }

  // Fetch and render markdown (use raw GitHub URL to bypass CORS)
  async function loadMarkdown() {
    try {
      const rawUrl = 'https://raw.githubusercontent.com/jessekranz/SmarterNerd/master/SmarterNerd%20SEO%20Contract%20Template.md';
      const response = await fetch(rawUrl);
      if (!response.ok) throw new Error('Failed to fetch');
      const markdown = await response.text();
      const htmlContent = document.getElementById('markdown-content');
      htmlContent.innerHTML = markdownToHtml(markdown);

      // Generate table of contents
      generateTOC(markdown);
    } catch (error) {
      console.error('Error loading markdown:', error);
      document.getElementById('markdown-content').innerHTML =
        '<p style="color: var(--muted);">Error loading contract. <a href="https://github.com/jessekranz/SmarterNerd/blob/master/SmarterNerd%20SEO%20Contract%20Template.md">View on GitHub</a></p>';
    }
  }

  // Generate table of contents
  function generateTOC(markdown) {
    const lines = markdown.split('\n');
    const toc = document.getElementById('toc');
    let count = 0;

    lines.forEach((line, index) => {
      if (line.startsWith('# ') && !line.startsWith('##')) {
        count++;
        const text = line.replace(/^# /, '').trim();
        const id = `section-${count}`;
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = '#';
        a.textContent = text;
        a.addEventListener('click', (e) => {
          e.preventDefault();
          const h1 = Array.from(document.querySelectorAll('h1')).find(
            (h) => h.textContent.includes(text)
          );
          if (h1) {
            h1.scrollIntoView({ behavior: 'smooth' });
            a.classList.add('active');
            Array.from(toc.querySelectorAll('a')).forEach((link) => {
              if (link !== a) link.classList.remove('active');
            });
          }
        });
        li.appendChild(a);
        toc.appendChild(li);
      }
    });
  }

  // Tab switching
  document.querySelectorAll('.tab-btn').forEach((btn) => {
    btn.addEventListener('click', () => {
      const tabName = btn.dataset.tab;

      // Remove active class from all buttons and contents
      document.querySelectorAll('.tab-btn').forEach((b) => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach((c) => c.classList.remove('active'));

      // Add active class to clicked button and corresponding content
      btn.classList.add('active');
      document.getElementById(tabName).classList.add('active');

      // Show/hide sidebar
      const sidebar = document.getElementById('contract-sidebar');
      if (tabName === 'contract') {
        sidebar.classList.add('visible');
      } else {
        sidebar.classList.remove('visible');
      }

      // Load markdown on contract tab
      if (tabName === 'contract' && !document.getElementById('markdown-content').innerHTML) {
        loadMarkdown();
      }
    });
  });

  // Load markdown immediately on page load
  document.addEventListener('DOMContentLoaded', loadMarkdown);
</script>

</body>
</html>
